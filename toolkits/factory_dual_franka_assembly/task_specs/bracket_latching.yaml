extends: _dual_franka_assembly_base.yaml

task_name: bracket_latching
prompt: Two Franka arms seat a bracket and latch it into the shared fixture.
scene_asset_path: ${ASSET_PATH}/scenes/empty.usd
max_steps: 1800

robots:
  - name: franka_left
    prim_path: /franka_left
    position: [0.0, -0.72, 0.0]
    orientation_euler: [0.0, 0.0, 1.5707963268]
  - name: franka_right
    prim_path: /franka_right
    position: [0.0, 0.72, 0.0]
    orientation_euler: [0.0, 0.0, -1.5707963268]

objects:
  - name: bracket
    kind: dynamic_cube
    prim_path: /bracket
    position: [0.56, -0.23, 0.02]
    random_xy: [0.04, 0.03]
    scale: [0.17, 0.07, 0.05]
    color: [0.84, 0.50, 0.19]
  - name: latch
    kind: dynamic_cube
    prim_path: /latch
    position: [0.56, 0.22, 0.035]
    random_xy: [0.04, 0.03]
    scale: [0.03, 0.03, 0.07]
    color: [0.73, 0.73, 0.74]
  - name: latch_fixture
    kind: visual_cube
    prim_path: /latch_fixture
    position: [0.82, 0.0, 0.07]
    scale: [0.20, 0.18, 0.14]
    color: [0.21, 0.30, 0.35]
    tracked: false
  - name: assembly_station
    kind: visual_cube
    prim_path: /assembly_station
    position: [0.82, 0.0, 0.005]
    scale: [0.40, 0.54, 0.01]
    color: [0.18, 0.18, 0.18]
    tracked: false

targets:
  - name: left_wait
    reference: world
    position: [0.34, -0.28, 0.42]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: right_wait
    reference: world
    position: [0.34, 0.28, 0.42]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: left_retreat
    reference: world
    position: [0.22, -0.52, 0.48]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: right_retreat
    reference: world
    position: [0.22, 0.52, 0.48]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: bracket_pick
    reference: bracket
    offset: [0.0, 0.0, 0.17]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: bracket_fixture_hover
    reference: latch_fixture
    offset: [0.0, 0.0, 0.18]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: bracket_fixture_hold
    reference: latch_fixture
    offset: [0.0, 0.0, 0.13]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: bracket_locked
    reference: latch_fixture
    offset: [0.0, 0.0, 0.09]
    orientation_euler: [1.0e-06, 0.0, 0.0]
  - name: latch_pick
    reference: latch
    offset: [0.0, 0.0, 0.12]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: latch_preinsert
    reference: latch_fixture
    offset: [0.03, 0.0, 0.20]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: latch_insert
    reference: latch_fixture
    offset: [0.03, 0.0, 0.14]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: latch_locked
    reference: latch_fixture
    offset: [0.03, 0.0, 0.11]
    orientation_euler: [1.0e-06, 0.0, 0.0]

phases:
  - name: left_approach_bracket
    robot_targets:
      franka_left: bracket_pick
      franka_right: right_wait
    gripper_commands:
      franka_left: open
      franka_right: open
    advance:
      type: robot_targets_reached
      min_steps: 12
      tolerance: 0.04
  - name: left_grasp_bracket
    robot_targets:
      franka_left: bracket_pick
      franka_right: right_wait
    gripper_commands:
      franka_left: close
      franka_right: open
    attach:
      - object: bracket
        robot: franka_left
    advance:
      type: timer
      min_steps: 16
  - name: left_present_bracket
    robot_targets:
      franka_left: bracket_fixture_hover
      franka_right: latch_pick
    gripper_commands:
      franka_left: close
      franka_right: open
    advance:
      type: robot_targets_reached
      min_steps: 12
      tolerance: 0.04
  - name: right_grasp_latch
    robot_targets:
      franka_left: bracket_fixture_hover
      franka_right: latch_pick
    gripper_commands:
      franka_left: close
      franka_right: close
    attach:
      - object: latch
        robot: franka_right
    advance:
      type: timer
      min_steps: 16
  - name: right_preinsert_latch
    robot_targets:
      franka_left: bracket_fixture_hold
      franka_right: latch_preinsert
    gripper_commands:
      franka_left: close
      franka_right: close
    advance:
      type: robot_targets_reached
      min_steps: 12
      tolerance: 0.035
  - name: right_insert_latch
    robot_targets:
      franka_left: bracket_fixture_hold
      franka_right: latch_insert
    gripper_commands:
      franka_left: close
      franka_right: close
    advance:
      type: robot_targets_reached
      min_steps: 14
      tolerance: 0.03
  - name: finalize_latching
    robot_targets:
      franka_left: bracket_fixture_hold
      franka_right: latch_insert
    gripper_commands:
      franka_left: open
      franka_right: open
    detach:
      - bracket
      - latch
    lock:
      - object: bracket
        target: bracket_locked
      - object: latch
        target: latch_locked
    advance:
      type: timer
      min_steps: 20
  - name: retreat
    robot_targets:
      franka_left: left_retreat
      franka_right: right_retreat
    gripper_commands:
      franka_left: open
      franka_right: open
    advance:
      type: robot_targets_reached
      min_steps: 12
      tolerance: 0.05

success:
  - object: bracket
    target: bracket_locked
    position_tolerance: 0.03
  - object: latch
    target: latch_locked
    position_tolerance: 0.025
