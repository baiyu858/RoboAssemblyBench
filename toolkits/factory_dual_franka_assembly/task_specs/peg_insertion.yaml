extends: _dual_franka_assembly_base.yaml

task_name: peg_insertion
prompt: "Two Franka arms perform a real peg insertion: a fixed holed socket block sits on the workbench while the right arm inserts a wooden peg into its center slot."
scene_profile: taoyuan_tabletop
scene_asset_path: ${ASSET_PATH}/scenes/empty.usd
max_steps: 3200
phase_timeout_steps: 420
phase_timeout_action: fail

robots:
  - name: franka_left
    prim_path: /franka_left
    position: [0.08, -0.62, 0.0]
    orientation_euler: [0.0, 0.0, 1.5707963268]
  - name: franka_right
    prim_path: /franka_right
    position: [0.08, 0.62, 0.0]
    orientation_euler: [0.0, 0.0, -1.5707963268]

objects:
  - name: housing_anchor
    kind: visual_cube
    prim_path: /housing_anchor
    position: [0.47, -0.04, 0.036]
    scale: [0.001, 0.001, 0.001]
    color: [0.23, 0.57, 0.84]
    tracked: false
  - name: housing_base
    kind: static_cube
    prim_path: /housing_base
    position: [0.47, -0.04, 0.016]
    scale: [0.130, 0.130, 0.012]
    color: [0.23, 0.57, 0.84]
    static_friction: 1.2
    dynamic_friction: 0.95
    restitution: 0.0
    tracked: false
  - name: housing_left_wall
    kind: static_cube
    prim_path: /housing_left_wall
    position: [0.420, -0.04, 0.042]
    scale: [0.030, 0.130, 0.040]
    color: [0.23, 0.57, 0.84]
    static_friction: 1.2
    dynamic_friction: 0.95
    restitution: 0.0
    tracked: false
  - name: housing_right_wall
    kind: static_cube
    prim_path: /housing_right_wall
    position: [0.520, -0.04, 0.042]
    scale: [0.030, 0.130, 0.040]
    color: [0.23, 0.57, 0.84]
    static_friction: 1.2
    dynamic_friction: 0.95
    restitution: 0.0
    tracked: false
  - name: housing_front_wall
    kind: static_cube
    prim_path: /housing_front_wall
    position: [0.47, -0.083, 0.042]
    scale: [0.070, 0.044, 0.040]
    color: [0.23, 0.57, 0.84]
    static_friction: 1.2
    dynamic_friction: 0.95
    restitution: 0.0
    tracked: false
  - name: housing_back_wall
    kind: static_cube
    prim_path: /housing_back_wall
    position: [0.47, 0.003, 0.042]
    scale: [0.070, 0.044, 0.040]
    color: [0.23, 0.57, 0.84]
    static_friction: 1.2
    dynamic_friction: 0.95
    restitution: 0.0
    tracked: false
  - name: peg
    kind: dynamic_cube
    prim_path: /peg
    position: [0.47, 0.26, 0.044]
    random_xy: [0.01, 0.01]
    scale: [0.046, 0.018, 0.068]
    color: [0.92, 0.82, 0.22]
    mass: 0.025
    static_friction: 1.1
    dynamic_friction: 0.85
    restitution: 0.0
  - name: insertion_jig
    kind: visual_cube
    prim_path: /insertion_jig
    position: [0.47, -0.04, 0.011]
    scale: [0.014, 0.014, 0.002]
    color: [0.18, 0.34, 0.28]
    tracked: false
  - name: workbench
    kind: static_cube
    prim_path: /workbench
    position: [0.47, -0.04, 0.005]
    scale: [0.42, 0.62, 0.01]
    color: [0.18, 0.18, 0.18]
    static_friction: 1.2
    dynamic_friction: 0.9
    restitution: 0.0
    tracked: false

targets:
  - name: left_wait
    reference: world
    position: [0.24, -0.44, 0.52]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: right_wait
    reference: world
    position: [0.24, 0.44, 0.52]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: left_retreat
    reference: world
    position: [0.16, -0.66, 0.56]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: right_retreat
    reference: world
    position: [0.16, 0.66, 0.56]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: peg_pick
    reference: peg
    offset: [0.0, 0.0, 0.11]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: peg_grasp_open
    reference: peg
    offset: [0.0, 0.0, 0.008]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: peg_grasp_close
    reference: peg
    offset: [0.0, 0.0, -0.006]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: peg_preinsert
    reference: housing_anchor
    offset: [0.0, 0.08, 0.094]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: right_preinsert_lane_robot
    reference: housing_anchor
    offset: [-0.002, 0.131, 0.225]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: right_preinsert_robot
    reference: housing_anchor
    offset: [-0.002, 0.011, 0.165]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: peg_preinsert_lane
    reference: housing_anchor
    offset: [0.0, 0.20, 0.154]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: right_insert_lane_robot
    reference: housing_anchor
    offset: [-0.002, -0.039, 0.171]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: right_insert_robot
    reference: housing_anchor
    offset: [-0.001, 0.000, 0.121]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: peg_insert_lane
    reference: housing_anchor
    offset: [0.0, 0.03, 0.100]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: peg_insert
    reference: housing_anchor
    offset: [0.0, 0.0, 0.078]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: peg_locked
    reference: housing_anchor
    offset: [0.0, 0.0, 0.022]
    orientation_euler: [1.0e-06, 0.0, 0.0]

phases:
  - name: right_approach_peg
    robot_targets:
      franka_left:
        target: left_wait
        position_tolerance: 0.08
      franka_right:
        target: peg_pick
        position_tolerance: 0.06
    gripper_commands:
      franka_left: open
      franka_right: open
    advance:
      type: robot_targets_reached
      min_steps: 12
      tolerance: 0.04
  - name: right_descend_peg_open
    timeout_steps: 320
    timeout_action: fail
    robot_targets:
      franka_left:
        target: left_wait
        position_tolerance: 0.08
      franka_right:
        target: peg_grasp_open
        position_tolerance: 0.03
    gripper_commands:
      franka_left: open
      franka_right: open
    advance:
      type: robot_targets_reached
      min_steps: 10
      tolerance: 0.03
  - name: right_grasp_peg
    timeout_steps: 320
    robot_targets:
      franka_left:
        target: left_wait
        position_tolerance: 0.08
      franka_right:
        target: peg_grasp_close
        position_tolerance: 0.015
    gripper_commands:
      franka_left: open
      franka_right: close
    attach:
      - object: peg
        robot: franka_right
        target: peg_grasp_close
        position_tolerance: 0.010
        attachment_mode: pure_physical_grasp
        disable_collision_on_attach: false
        support_height_tolerance: 0.03
        top_clearance: 0.02
        gripper_closed_threshold: 0.010
        gripper_closed_margin: 0.002
        allow_top_contact_fallback: false
        require_physical_contact: true
        require_target_reached_for_attach: true
        physical_grasp_min_opening: 0.005
        attach_gripper_object_margin: 0.001
        hold_gripper_object_margin: 0.003
        finger_contact_distance: 0.006
        physical_attach_surface_gap: 0.006
        slender_lateral_threshold: 0.03
        hold_position_slip_tolerance: 0.045
        hold_grace_steps: 18
        hold_grace_extra_opening: 0.010
        release_min_steps: 80
        release_require_contact_clear: false
        release_finger_contact_distance: 0.0015
        release_gripper_opening_threshold: 0.028
        release_gripper_object_margin: 0.0
    advance:
      type: timer
      min_steps: 24
  - name: right_secure_peg
    timeout_steps: 160
    timeout_action: fail
    robot_targets:
      franka_left:
        target: left_wait
        position_tolerance: 0.08
      franka_right:
        target: peg_grasp_close
        position_tolerance: 0.015
    gripper_commands:
      franka_left: open
      franka_right: close
    advance:
      type: timer
      min_steps: 24
  - name: right_lift_peg_verify
    timeout_steps: 180
    timeout_action: fail
    robot_targets:
      franka_left:
        target: left_wait
        position_tolerance: 0.08
      franka_right:
        target: peg_pick
        position_tolerance: 0.08
    gripper_commands:
      franka_left: open
      franka_right: close
    advance:
      type: all_of
      min_steps: 12
      conditions:
        - type: robot_targets_reached
          tolerance: 0.08
        - type: object_lifted
          object: peg
          robot: franka_right
          min_lift: 0.05
  - name: right_preinsert_lane
    timeout_steps: 420
    timeout_action: fail
    robot_targets:
      franka_left:
        target: left_wait
        position_tolerance: 0.08
      franka_right:
        target: right_preinsert_lane_robot
        position_tolerance: 0.06
    gripper_commands:
      franka_left: open
      franka_right: close
    advance:
      type: robot_targets_reached
      min_steps: 12
      tolerance: 0.08
  - name: right_preinsert_peg
    timeout_steps: 260
    timeout_action: fail
    robot_targets:
      franka_left:
        target: left_wait
        position_tolerance: 0.08
      franka_right:
        target: right_preinsert_robot
        position_tolerance: 0.05
    gripper_commands:
      franka_left: open
      franka_right: close
    advance:
      type: robot_targets_reached
      min_steps: 12
      tolerance: 0.06
  - name: right_insert_lane
    timeout_steps: 260
    timeout_action: fail
    robot_targets:
      franka_left:
        target: left_wait
        position_tolerance: 0.08
      franka_right:
        target: right_insert_lane_robot
        position_tolerance: 0.05
    gripper_commands:
      franka_left: open
      franka_right: close
    advance:
      type: robot_targets_reached
      min_steps: 12
      tolerance: 0.06
  - name: right_insert_peg
    timeout_steps: 520
    timeout_action: advance
    robot_targets:
      franka_left:
        target: left_wait
        position_tolerance: 0.08
      franka_right:
        target: right_insert_robot
        payload_object: peg
        payload_target: peg_locked
        orientation_tolerance: 0.25
        position_tolerance: 0.08
    gripper_commands:
      franka_left: open
      franka_right: close
    advance:
      type: all_of
      min_steps: 24
      conditions:
        - type: robot_targets_reached
          tolerance: 0.04
        - type: object_targets_reached
          tolerance: 0.025
          objects:
            - object: peg
              target: peg_locked
              position_tolerance: 0.025
              orientation_tolerance: 0.45
  - name: finalize_insertion
    timeout_steps: 260
    timeout_action: fail
    robot_targets:
      franka_left:
        target: left_wait
        position_tolerance: 0.08
      franka_right:
        target: right_insert_robot
        payload_object: peg
        payload_target: peg_locked
        position_tolerance: 0.06
    gripper_commands:
      franka_left: open
      franka_right: open
    detach:
      - peg
    advance:
      type: timer
      min_steps: 24
  - name: settle_peg_in_jig
    timeout_steps: 220
    timeout_action: fail
    robot_targets:
      franka_left:
        target: left_wait
        position_tolerance: 0.08
      franka_right:
        target: right_insert_lane_robot
        position_tolerance: 0.08
    gripper_commands:
      franka_left: open
      franka_right: open
    advance:
      type: all_of
      min_steps: 12
      conditions:
        - type: robot_targets_reached
          tolerance: 0.08
        - type: object_targets_reached
          tolerance: 0.02
          objects:
            - object: peg
              target: peg_locked
              position_tolerance: 0.025
              orientation_tolerance: 0.45
        - type: objects_static
          linear_velocity_threshold: 0.025
          angular_velocity_threshold: 0.8
          objects:
            - peg
  - name: retreat
    robot_targets:
      franka_left: left_retreat
      franka_right: right_retreat
    gripper_commands:
      franka_left: open
      franka_right: open
    advance:
      type: robot_targets_reached
      min_steps: 12
      tolerance: 0.08

success:
  - object: peg
    target: peg_locked
    position_tolerance: 0.025
    orientation_tolerance: 0.45
    require_released: true
    require_static: true
    linear_velocity_threshold: 0.02
    angular_velocity_threshold: 0.8
