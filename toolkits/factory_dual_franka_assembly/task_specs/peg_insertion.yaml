extends: _dual_franka_assembly_base.yaml

task_name: peg_insertion
prompt: Two Franka arms align the housing and insert the peg into the shared jig.
scene_profile: taoyuan_tabletop
scene_asset_path: ${ASSET_PATH}/scenes/empty.usd
max_steps: 1800
phase_timeout_steps: 320
phase_timeout_action: fail

robots:
  - name: franka_left
    prim_path: /franka_left
    position: [0.08, -0.62, 0.0]
    orientation_euler: [0.0, 0.0, 1.5707963268]
  - name: franka_right
    prim_path: /franka_right
    position: [0.08, 0.62, 0.0]
    orientation_euler: [0.0, 0.0, -1.5707963268]

objects:
  - name: housing
    kind: dynamic_cube
    prim_path: /housing
    position: [0.47, -0.26, 0.02]
    random_xy: [0.01, 0.01]
    scale: [0.12, 0.065, 0.04]
    color: [0.23, 0.57, 0.84]
    mass: 0.09
  - name: peg
    kind: dynamic_cube
    prim_path: /peg
    position: [0.47, 0.26, 0.035]
    random_xy: [0.01, 0.01]
    scale: [0.03, 0.03, 0.07]
    color: [0.92, 0.82, 0.22]
    mass: 0.03
  - name: insertion_jig
    kind: visual_cube
    prim_path: /insertion_jig
    position: [0.47, -0.04, 0.08]
    scale: [0.02, 0.02, 0.02]
    color: [0.18, 0.34, 0.28]
    tracked: false
  - name: jig_left_guide
    kind: static_cube
    prim_path: /jig_left_guide
    position: [0.47, -0.13, 0.065]
    scale: [0.18, 0.02, 0.13]
    color: [0.16, 0.28, 0.24]
    tracked: false
  - name: jig_right_guide
    kind: static_cube
    prim_path: /jig_right_guide
    position: [0.47, 0.05, 0.065]
    scale: [0.18, 0.02, 0.13]
    color: [0.16, 0.28, 0.24]
    tracked: false
  - name: workbench
    kind: static_cube
    prim_path: /workbench
    position: [0.47, -0.04, 0.005]
    scale: [0.40, 0.54, 0.01]
    color: [0.18, 0.18, 0.18]
    tracked: false

targets:
  - name: left_wait
    reference: world
    position: [0.24, -0.44, 0.52]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: right_wait
    reference: world
    position: [0.24, 0.44, 0.52]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: left_retreat
    reference: world
    position: [0.16, -0.66, 0.56]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: right_retreat
    reference: world
    position: [0.16, 0.66, 0.56]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: housing_pick
    reference: housing
    offset: [0.0, 0.0, 0.075]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: housing_grasp
    reference: housing
    offset: [0.0, 0.0, 0.006]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: housing_carry_lift
    reference: housing
    offset: [0.0, 0.0, 0.16]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: housing_jig_lane
    reference: insertion_jig
    offset: [0.0, -0.24, 0.16]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: housing_hold
    reference: insertion_jig
    offset: [0.0, 0.0, 0.136]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: housing_hover
    reference: insertion_jig
    offset: [0.0, -0.06, 0.175]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: housing_preseat
    reference: insertion_jig
    offset: [0.0, -0.02, 0.15]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: housing_locked
    reference: insertion_jig
    offset: [0.0, 0.0, 0.10]
    orientation_euler: [1.0e-06, 0.0, 0.0]
  - name: peg_pick
    reference: peg
    offset: [0.0, 0.0, 0.105]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: peg_grasp
    reference: peg
    offset: [0.0, 0.0, 0.022]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: peg_preinsert
    reference: insertion_jig
    offset: [0.02, 0.12, 0.20]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: peg_preinsert_lane
    reference: insertion_jig
    offset: [0.02, 0.22, 0.22]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: peg_insert_lane
    reference: insertion_jig
    offset: [0.02, 0.18, 0.18]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: peg_insert
    reference: insertion_jig
    offset: [0.02, 0.12, 0.155]
    orientation_euler: [3.1415926536, 0.0, 0.0]
  - name: peg_locked
    reference: insertion_jig
    offset: [0.02, 0.12, 0.11]
    orientation_euler: [1.0e-06, 0.0, 0.0]

phases:
  - name: left_approach_housing
    robot_targets:
      franka_left:
        target: housing_pick
        ik_frame_compensation: position_only
        position_tolerance: 0.06
      franka_right:
        target: right_wait
        position_tolerance: 0.08
    gripper_commands:
      franka_left: open
      franka_right: open
    advance:
      type: robot_targets_reached
      min_steps: 12
      tolerance: 0.04
  - name: left_descend_housing_open
    timeout_steps: 120
    timeout_action: advance
    robot_targets:
      franka_left:
        target: housing_grasp
        ik_frame_compensation: position_only
        position_only: true
        position_tolerance: 0.03
      franka_right:
        target: right_wait
        position_tolerance: 0.08
    gripper_commands:
      franka_left: open
      franka_right: open
    advance:
      type: robot_targets_reached
      min_steps: 10
      tolerance: 0.03
  - name: left_grasp_housing
    timeout_steps: 320
    robot_targets:
      franka_left:
        target: housing_grasp
        ik_frame_compensation: position_only
        position_only: true
        position_tolerance: 0.03
      franka_right:
        target: right_wait
        position_tolerance: 0.08
    gripper_commands:
      franka_left: close
      franka_right: open
    attach:
      - object: housing
        robot: franka_left
        target:
          target: housing_grasp
          ik_frame_compensation: position_only
          position_only: true
        position_tolerance: 0.025
        attachment_mode: contact_fixed_joint
        disable_collision_on_attach: false
        support_height_tolerance: 0.03
        top_clearance: 0.02
        gripper_closed_threshold: 0.010
        allow_top_contact_fallback: false
        allow_enclosure_fallback: false
        require_physical_contact: true
        physical_attach_surface_gap: 0.006
        hold_position_slip_tolerance: 0.035
    advance:
      type: timer
      min_steps: 16
  - name: left_present_housing
    timeout_steps: 480
    robot_targets:
      franka_left:
        target: housing_jig_lane
        via:
          - housing_carry_lift
        position_tolerance: 0.06
      franka_right:
        target: right_wait
        position_tolerance: 0.08
    gripper_commands:
      franka_left: close
      franka_right: open
    advance:
      type: robot_targets_reached
      min_steps: 12
      tolerance: 0.04
  - name: seat_housing_in_jig
    timeout_steps: 320
    timeout_action: advance
    robot_targets:
      franka_left:
        target: housing_hold
        via:
          - housing_hover
          - housing_preseat
        position_tolerance: 0.07
      franka_right:
        target: right_wait
        position_tolerance: 0.08
    gripper_commands:
      franka_left: close
      franka_right: open
    advance:
      type: all_of
      min_steps: 12
      conditions:
        - type: robot_targets_reached
          tolerance: 0.07
        - type: object_targets_reached
          tolerance: 0.03
          objects:
            - object: housing
              target: housing_locked
              position_tolerance: 0.03
  - name: release_housing_in_jig
    robot_targets:
      franka_left:
        target: housing_hold
        position_tolerance: 0.05
      franka_right:
        target: right_wait
        position_tolerance: 0.08
    gripper_commands:
      franka_left: open
      franka_right: open
    detach:
      - housing
    lock:
      - object: housing
        target: housing_locked
    advance:
      type: timer
      min_steps: 10
  - name: right_approach_peg
    robot_targets:
      franka_left:
        target: left_wait
        position_tolerance: 0.08
      franka_right:
        target: peg_pick
        position_tolerance: 0.06
    gripper_commands:
      franka_left: open
      franka_right: open
    advance:
      type: robot_targets_reached
      min_steps: 12
      tolerance: 0.04
  - name: right_descend_peg_open
    timeout_steps: 120
    timeout_action: advance
    robot_targets:
      franka_left:
        target: left_wait
        position_tolerance: 0.08
      franka_right:
        target: peg_grasp
        position_tolerance: 0.03
    gripper_commands:
      franka_left: open
      franka_right: open
    advance:
      type: robot_targets_reached
      min_steps: 10
      tolerance: 0.03
  - name: right_grasp_peg
    timeout_steps: 320
    robot_targets:
      franka_left:
        target: left_wait
        position_tolerance: 0.08
      franka_right:
        target: peg_grasp
        position_tolerance: 0.03
    gripper_commands:
      franka_left: open
      franka_right: close
    attach:
      - object: peg
        robot: franka_right
        target: peg_grasp
        position_tolerance: 0.025
        attachment_mode: contact_fixed_joint
        disable_collision_on_attach: false
        support_height_tolerance: 0.03
        top_clearance: 0.02
        gripper_closed_threshold: 0.009
        allow_top_contact_fallback: false
        require_target_reached_for_attach: true
        finger_contact_distance: 0.002
        physical_attach_surface_gap: 0.0025
        slender_lateral_threshold: 0.04
        hold_position_slip_tolerance: 0.02
    advance:
      type: timer
      min_steps: 16
  - name: right_preinsert_peg
    timeout_steps: 320
    timeout_action: advance
    robot_targets:
      franka_left:
        target: left_wait
        position_tolerance: 0.08
      franka_right:
        target: peg_preinsert
        via:
          - peg_preinsert_lane
        position_tolerance: 0.11
    gripper_commands:
      franka_left: open
      franka_right: close
    advance:
      type: robot_targets_reached
      min_steps: 12
      tolerance: 0.11
  - name: right_insert_peg
    timeout_steps: 240
    timeout_action: advance
    robot_targets:
      franka_left:
        target: left_wait
        position_tolerance: 0.08
      franka_right:
        target: peg_insert
        via:
          - peg_insert_lane
        position_tolerance: 0.08
    gripper_commands:
      franka_left: open
      franka_right: close
    advance:
      type: robot_targets_reached
      min_steps: 14
      tolerance: 0.08
  - name: finalize_insertion
    robot_targets:
      franka_left:
        target: left_wait
        position_tolerance: 0.08
      franka_right: peg_insert
    gripper_commands:
      franka_left: open
      franka_right: open
    detach:
      - peg
    lock:
      - object: peg
        target: peg_locked
    advance:
      type: timer
      min_steps: 20
  - name: retreat
    robot_targets:
      franka_left: left_retreat
      franka_right: right_retreat
    gripper_commands:
      franka_left: open
      franka_right: open
    advance:
      type: robot_targets_reached
      min_steps: 12
      tolerance: 0.08

success:
  - object: housing
    target: housing_locked
    position_tolerance: 0.03
  - object: peg
    target: peg_locked
    position_tolerance: 0.025
