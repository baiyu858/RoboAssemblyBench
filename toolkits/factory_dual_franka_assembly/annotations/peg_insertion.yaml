extends: _base.yaml
task_name: peg_insertion
title: Peg insertion
summary: The right Franka inserts a wooden peg into the center hole of a fixed socket block.
task_description: >-
  A square socket block with a physical center opening is fixed on the workbench. The right Franka
  physically grasps a wooden peg, lifts it, aligns it over the socket, presses it into the center
  hole, releases it, and retreats after the peg is seated and static.
metadata:
  tags:
    - peg
    - insertion
    - socket
    - physical-grasp
  object_roles:
    housing_anchor:
      role: target_reference
      summary: Invisible reference at the center of the fixed socket hole.
    housing_base:
      role: socket_base
      summary: Static base of the holed block that supports the inserted peg.
    housing_left_wall:
      role: socket_wall
      summary: Static collision wall forming the left side of the center hole.
    housing_right_wall:
      role: socket_wall
      summary: Static collision wall forming the right side of the center hole.
    housing_front_wall:
      role: socket_wall
      summary: Static collision wall forming the front side of the center hole.
    housing_back_wall:
      role: socket_wall
      summary: Static collision wall forming the back side of the center hole.
    peg:
      role: insertion_pin
      owner: franka_right
      summary: Wooden peg grasped and inserted into the socket hole.
    insertion_jig:
      role: visual_marker
      summary: Visual marker for the insertion center; it does not lock or snap the peg.
    workbench:
      role: support_surface
      summary: Static tabletop surface supporting the socket block and peg.
  target_roles:
    left_wait:
      phase: right_approach_peg
      summary: Left-arm idle pose while the right arm performs insertion.
    right_wait:
      phase: right_approach_peg
      summary: Right-arm default staging pose.
    left_retreat:
      phase: retreat
      summary: Left-arm retreat pose after insertion.
    right_retreat:
      phase: retreat
      summary: Right-arm retreat pose after insertion.
    peg_pick:
      object: peg
      phase: right_approach_peg
      summary: Hover pose above the peg before grasping.
    peg_grasp_open:
      object: peg
      phase: right_descend_peg_open
      summary: Open-gripper pose just above the peg.
    peg_grasp_close:
      object: peg
      phase: right_grasp_peg
      summary: Physical grasp pose for closing around the peg.
    right_preinsert_robot:
      object: peg
      phase: right_preinsert_peg
      summary: Right-arm staging pose that aligns the grasped peg near the socket.
    right_insert_robot:
      object: peg
      phase: right_insert_peg
      summary: Payload-driven insertion target that places the peg into the socket hole.
    peg_locked:
      object: peg
      phase: settle_peg_in_jig
      summary: Final seated peg pose at the center of the physical socket.
  phase_notes:
    - name: right_approach_peg
      summary: Right arm approaches the wooden peg while the left arm waits.
      focus_objects:
        - peg
      focus_targets:
        - peg_pick
    - name: right_grasp_peg
      summary: Right gripper closes around the peg using physical contact without snapping.
      focus_objects:
        - peg
      focus_targets:
        - peg_grasp_close
    - name: right_lift_peg_verify
      summary: The grasp is verified by lifting the peg away from the workbench.
      focus_objects:
        - peg
      focus_targets:
        - peg_pick
    - name: right_preinsert_peg
      summary: The grasped peg is carried to a pre-insertion pose above the fixed socket.
      focus_objects:
        - peg
      focus_targets:
        - right_preinsert_robot
    - name: right_insert_peg
      summary: The right arm drives the attached peg into the center hole using payload pose control.
      focus_objects:
        - peg
        - housing_base
      focus_targets:
        - right_insert_robot
        - peg_locked
    - name: finalize_insertion
      summary: The gripper opens and releases the peg after it has been pressed into the socket.
      focus_objects:
        - peg
      focus_targets:
        - peg_locked
    - name: settle_peg_in_jig
      summary: The released peg must remain static and seated in the socket without any lock or snap.
      focus_objects:
        - peg
      focus_targets:
        - peg_locked
