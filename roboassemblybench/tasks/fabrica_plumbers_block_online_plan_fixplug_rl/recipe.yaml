extends: _dual_franka_assembly_base.yaml
task_name: fabrica_plumbers_block_online_plan_fixplug_rl
prompt: Two Franka arms assemble the Fabrica plumbers-block task using Isaac Sim online motion planning for pickup, transport,
  and preinsert targets, then local Fabrica FixPlug RL insertion windows.
scene_profile: taoyuan_grscenes_tabletop
scene_asset_path: ${ISAAC_ASSETS_ROOT}/Isaac/Environments/Simple_Warehouse/warehouse_with_forklifts.usd
scene_asset_fallback_path: ${BENCHMARK_ROOT}/scenes/usd/factory_cell.usda
max_steps: 14000
phase_timeout_steps: 1200
phase_timeout_action: fail
source_benchmark: fabrica
source_config_path: roboassemblybench/assets/Fabrica/fabrica_franka_plumbers_block_optical_board_black_fullbundle_sdf001
metadata:
  asset_source: ${BENCHMARK_ROOT}/assets/Fabrica/fabrica_franka_plumbers_block_optical_board_black_fullbundle_sdf001
  asset_references:
  - name: fabrica_franka_plumbers_block_fullbundle
    kind: directory
    path: ${BENCHMARK_ROOT}/assets/Fabrica/fabrica_franka_plumbers_block_optical_board_black_fullbundle_sdf001
    role: source_bundle
  - name: fabrica_plumbers_scene_usda
    kind: scene
    path: ${BENCHMARK_ROOT}/assets/Fabrica/fabrica_franka_plumbers_block_optical_board_black_fullbundle_sdf001/scene/scene.usda
    role: source_scene_reference
  - name: fabrica_plumbers_manifest
    kind: manifest
    path: ${BENCHMARK_ROOT}/assets/Fabrica/fabrica_franka_plumbers_block_optical_board_black_fullbundle_sdf001/assets/fabrica_original_usd_sdf_margin_001/aligned/plumbers_block/manifest.json
    role: assembly_metadata
  - name: fabrica_plumbers_assembled_preview
    kind: usd
    path: ${BENCHMARK_ROOT}/assets/Fabrica/fabrica_franka_plumbers_block_optical_board_black_fullbundle_sdf001/assets/fabrica_original_usd_sdf_margin_001/aligned/plumbers_block/assembled/fabrica_plumbers_block_assembled.usda
    role: assembled_reference_visual
  - name: fabrica_plumbers_pickup_fixture_usd
    kind: usd
    path: ${BENCHMARK_ROOT}/assets/Fabrica/fabrica_franka_plumbers_block_optical_board_black_fullbundle_sdf001/assets/fabrica_fixture/plumbers_block/fixture_pickup_tray.usda
    role: official_pickup_fixture_visual
  tags:
  - fabrica
  - plumbers-block
  - fixplug-rl
  - isaacgym-checkpoint
  - online-plan
  - isaacsim-online-planning
  disable_joint_planner_when_attached: true
  local_skills:
    fabrica_fixplug_rl:
      backend: fabrica_fixplug
      checkpoint: roboassemblybench/assets/Fabrica/checkpoints/plumbers_block_fixplug_rl/sr_gen_plumbers_block.pth
      plan_info: roboassemblybench/assets/Fabrica/checkpoints/plumbers_block_fixplug_rl/plumbers_block_plan_info.pkl
      config: roboassemblybench/assets/Fabrica/checkpoints/plumbers_block_fixplug_rl/config.yaml
      adapter: toolkits.factory_dual_franka_assembly.factory_insert_adapter:FabricaFixPlugPolicyAdapter
      observation_space: 3
      action_space: 3
      device: cpu
      path_transform: true
      residual_action: true
      residual_guard: true
      residual_stagnation_patience: 32
      residual_progress_epsilon: 0.0005
      pos_action_scale:
      - 0.005
      - 0.005
      - 0.005
      max_position_step: 0.006
      trained_task: FabricaFixPlugTaskAssemble
      trained_backend: Isaac Gym PhysX
      trained_assumption: plug fixed to Franka hand; policy controls only the local insertion residual
  fabrica_official_layout:
    source_scene: ${BENCHMARK_ROOT}/assets/Fabrica/fabrica_franka_plumbers_block_optical_board_black_fullbundle_sdf001/scene/scene.usda
    source_scene_spec: ${BENCHMARK_ROOT}/assets/Fabrica/fabrica_franka_plumbers_block_optical_board_black_fullbundle_sdf001/scene/scene_spec.json
    pickup_fixture_source: third_part/Fabrica/logs/codex_plumbers_block_official/plumbers_block/fixture/fixture.obj
    pickup_pose_source: third_part/Fabrica/logs/codex_plumbers_block_official/plumbers_block/fixture/pickup.json
    assembly_order:
    - 2
    - 0
    - 3
    - 1
    - 4
    base_part_id: 2
    note: Mesh scales remain [1, 1, 1]. Fabrica motion/plan files are used only to derive discrete gripper target poses; runtime
      pickup/transport/preinsert motion is planned online in Isaac Sim instead of replaying motion.pkl joint trajectories.
    execution_mode: phase_flow_with_isaacsim_online_planning_and_fixplug_rl_insertions
    fixplug_pairs:
    - - '0'
      - '2'
    - - '3'
      - '2'
    - - '1'
      - '3'
    - - '4'
      - '3'
  rl_checkpoint_source: ssh://pcl@192.168.251.34:30737/data/baiyongjie/Fabrica/learning/isaacgymenvs/runs/sr_gen_plumbers_block_11-07-09-12
  online_planning_source:
    gripper_targets_from:
    - third_part/Fabrica/logs/codex_plumbers_block_official/plumbers_block/motion.pkl endpoints
    - roboassemblybench/assets/Fabrica/checkpoints/plumbers_block_fixplug_rl/plumbers_block_plan_info.pkl preassembly arm_q_plug
    runtime_planner: DualFrankaAssemblyDemoPolicy robofactory/mplib online joint planner for free-space moves, switching to Isaac
      Sim Cartesian IK once an object is attached because the joint planner does not model the carried payload.
    not_used_for_runtime_control: Fabrica motion.pkl joint trajectory replay
