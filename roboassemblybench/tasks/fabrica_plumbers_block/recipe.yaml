      plan_info: roboassemblybench/assets/Fabrica/checkpoints/plumbers_block_fixplug_rl/plumbers_block_plan_info.pkl
      config: roboassemblybench/assets/Fabrica/checkpoints/plumbers_block_fixplug_rl/config.yaml
      adapter: toolkits.factory_dual_franka_assembly.factory_insert_adapter:FabricaFixPlugPolicyAdapter
      observation_space: 3
      action_space: 3
      device: cpu
      path_transform: true
      residual_action: true
      pos_action_scale: [0.005, 0.005, 0.005]
      max_position_step: 0.006
      trained_task: FabricaFixPlugTaskAssemble
      trained_backend: Isaac Gym PhysX
      trained_assumption: plug fixed to Franka hand; policy controls only the local insertion residual.
