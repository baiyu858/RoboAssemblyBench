task_name: fabrica_plumbers_block_ur5e_fabrica_online_plan
title: Fabrica plumbers block UR5e online pickup and transport planning
summary: UR5e plumbers-block task variant that calls Fabrica's IK/RRT planner online for pickup and transport phases.
task_description: >-
  Two UR5e arms execute the Fabrica plumbers-block phase flow in the RoboAssemblyBench factory scene.
  Pickup, transport, and pre-insert phases are planned from current object poses using the official
  Fabrica arm motion planner instead of replaying fixed joint trajectories.
