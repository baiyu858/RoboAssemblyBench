extends: fabrica_plumbers_block_online_plan_fixplug_rl

task_name: fabrica_plumbers_block_ur5e_fabrica_online_plan
prompt: Two UR5e arms assemble the Fabrica plumbers-block task with official Fabrica online pickup and transport planning.

metadata:
  robot_asset_source: ${BENCHMARK_ROOT}/assets/Fabrica/fabrica_ur5e_cooling_optical_board_black_fullbundle_sdf001
  robot_model_parity: official_fabrica_ur5e_workcell_motion_pkl_joint_order
  gripper_tcp_parity: official_fabrica_robotiq_85_gripper_frame_from_planning.robot.util_arm
  coordinate_parity: official_fabrica_pickup_json_motion_pkl_world_to_plan_transform
  grasp_offset_parity: official_fabrica_part_to_gripper_pickup_transform
  collision_model_parity: isaac_dynamic_convex_decomposition_from_fabrica_usd_meshes
  hold_nonlocal_skill_robots: true
  disable_gripper_actions: false
  auto_advance_completed_local_skills: true
  auto_attach_completed_local_skills: true
  asset_references:
    - name: ur5e_robotiq_2f85_task
      kind: robot_usd
      path: ${BENCHMARK_ROOT}/assets/Fabrica/fabrica_ur5e_cooling_optical_board_black_fullbundle_sdf001/assets/ur5e_robotiq_2f85_task.usda
      role: official_isaac_ur5e_robotiq_robot
  tags:
    - fabrica
    - plumbers-block
    - ur5e
    - fabrica-online-planning
    - pickup-transport-replan
  local_skills:
    fabrica_fixplug_rl:
      use_official_fabrica_joint_servo: true
      official_joint_max_step: 0.025
      hold_on_official_ik_failure: true
      ik_regularization_parameter: 1.0
      preferred_joint_abs_limit: 3.05
      hard_preferred_joint_abs_limit: true
      joint_unwrap_reference_weight: 0.35
      joint_unwrap_limit_weight: 2.0
    fabrica_online_pickup_transport:
      backend: fabrica_motion_planner
      adapter: toolkits.factory_dual_franka_assembly.fabrica_online_planner_adapter:FabricaOnlinePickupTransportAdapter
      fabrica_root: third_part/Fabrica
      log_dir: third_part/Fabrica/logs/codex_plumbers_block_ur5e_official/plumbers_block
      assembly_dir: third_part/Fabrica/assets/fabrica/plumbers_block
      arm_type: ur5e
      gripper_type: robotiq-85
      pickup_motion_indices:
        "2": 5
        "0": 10
        "3": 17
        "1": 27
        "4": 34
      include_fixture: true
      path_stride: 1
      max_joint_step: 0.02
      joint_tolerance: 0.08
      planner_goal_tolerance: 0.08
      append_official_goal_on_short_path: true
      wrap_revolute_joint_error: true
      force_complete_after_steps: null
      max_speed: 1.2
      preferred_joint_abs_limit: 3.05
      hard_preferred_joint_abs_limit: true
      joint_unwrap_reference_weight: 0.35
      joint_unwrap_limit_weight: 2.0
      fallback: fail
      require_success: true
  fabrica_official_layout:
    robot_layout: official_dual_ur5e_robotiq_workcell
    execution_mode: fabrica_online_pickup_transport_replan_with_fixplug_insertions
    online_planner: third_part/Fabrica/planning/robot/motion_plan_arm.py
    note: >-
      This variant uses motion.pkl only to identify nominal official segment endpoints.
      The local skill adapter reads current Isaac Sim object poses, maps them into the
      Fabrica workcell frame, recomputes pickup IK for shifted parts, and runs Fabrica
      RRT collision planning for pickup/transport/preinsert phases.

