phases:
  - name: initial_wait
    lock_collision_default: false
    robot_targets: {}
    local_skill:
      name: hold_current_joints
    gripper_commands:
      franka_left: open
      franka_right: open
    lock:
      - object: fabrica_plumbers_block_0
        target: part_0_pickup
        position_tolerance: 0.03
        orientation_tolerance: 3.1416
      - object: fabrica_plumbers_block_1
        target: part_1_pickup
        position_tolerance: 0.03
        orientation_tolerance: 3.1416
      - object: fabrica_plumbers_block_2
