extends: fabrica_plumbers_block
task_name: fabrica_plumbers_block_ur5e
prompt: 'Two UR5e arms with Robotiq 2F-85 grippers replay the official Fabrica plumbers-block assembly scene in Isaac Sim.'
source_config_path: roboassemblybench/assets/Fabrica/fabrica_franka_plumbers_block_optical_board_black_fullbundle_sdf001
metadata:
  asset_source: ${BENCHMARK_ROOT}/assets/Fabrica/fabrica_franka_plumbers_block_optical_board_black_fullbundle_sdf001
  robot_asset_source: ${BENCHMARK_ROOT}/assets/Fabrica/fabrica_ur5e_cooling_optical_board_black_fullbundle_sdf001
  asset_note: This variant keeps the Fabrica plumbers-block parts, fixture, optical board, preview, and scene coordinates from the plumbers-block bundle, while replacing the logical dual Franka robots with UR5e + Robotiq 2F-85 robots from the available UR5e bundle. The inherited phase names still use franka_left/franka_right as logical robot identifiers for compatibility.
  asset_references:
    - name: fabrica_franka_plumbers_block_fullbundle
      kind: directory
      path: ${BENCHMARK_ROOT}/assets/Fabrica/fabrica_franka_plumbers_block_optical_board_black_fullbundle_sdf001
      role: plumbers_block_source_bundle
    - name: fabrica_ur5e_robot_bundle
      kind: directory
      path: ${BENCHMARK_ROOT}/assets/Fabrica/fabrica_ur5e_cooling_optical_board_black_fullbundle_sdf001
      role: ur5e_robot_source_bundle
    - name: ur5e_robotiq_task_wrapper
      kind: robot_usd
      path: ${BENCHMARK_ROOT}/assets/Fabrica/fabrica_ur5e_cooling_optical_board_black_fullbundle_sdf001/assets/ur5e_robotiq_2f85_task.usda
      role: robot_wrapper_with_variants
  tags:
    - fabrica
    - plumbers-block
    - ur5e
    - robotiq
    - dual-arm
  local_skills:
    fabrica_fixplug_rl:
      adapter_status: not_validated_for_ur5e_task_scene_only
      require_success: false
      note: The inherited plumbers-block FixPlug checkpoint was trained with plug fixed to a Franka hand. It is not automatically valid for UR5e without a retargeting or UR5e-specific local policy layer.
  fabrica_official_layout:
    robot_layout: dual_ur5e_robotiq_from_available_ur5e_bundle

camera_specs:
  - name: third_person_front
    owner: franka_left
    prim_path: /World/env_0/cameras/third_person_front
    view_type: front
    video_key: observation.images.isaac_3d
    description: Forward-facing third-person camera looking at both UR5e arms and the shared fixture.
    resolution: [960, 540]
    rgba: true
    attach_runtime_sensor: true
    translation: [5.0, 0.0, 3.2]
    orientation_euler: [0.0, 1.1868238914, 1.5707963268]
  - name: left_wrist
    owner: franka_left
    robot: franka_left
    prim_path: wrist_3_link/left_wrist_camera
    view_type: wrist
    video_key: observation.images.left_wrist
    description: Left wrist camera mounted on the UR5e wrist_3_link; initial pose copied from the Franka wrist camera for UI tuning.
    resolution: [640, 480]
    rgba: true
    attach_runtime_sensor: true
    translation: [-0.1, 0.0, -0.03]
    orientation_euler: [3.1415926536, -0.0872664626, 0.0]
    focal_length: 12.0
    horizontal_aperture: 20.955
    clipping_range: [0.01, 10.0]
    mount_offset: [-0.1, 0.0, -0.03]
    look_offset: [0.16, 0.0, -0.05]
    target_source: task_target
  - name: right_wrist
    owner: franka_right
    robot: franka_right
    prim_path: wrist_3_link/right_wrist_camera
    view_type: wrist
