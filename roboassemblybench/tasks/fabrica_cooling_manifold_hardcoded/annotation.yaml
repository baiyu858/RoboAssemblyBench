extends: _base.yaml
task_name: fabrica_cooling_manifold_hardcoded
title: Fabrica cooling manifold hardcoded deterministic demo
summary: Deterministic no-RL version of the Fabrica cooling-manifold six-part insertion
  task.
task_description: The right Franka automatically carries each cooling-manifold part
  using a fixed payload constraint, moves to the pre-insertion pose, deterministically
  advances the part into the fixed base with small steps, releases it, and locks the
  seated part for stable completion. No RL checkpoint is used.
metadata:
  tags:
  - fabrica
  - cooling-manifold
  - insertion
  - physical-grasp
  - dual-arm
  object_roles:
    fabrica_cooling_manifold_0:
      role: inserted_workpiece
      owner: franka_right
      summary: Loose physical Fabrica cooling-manifold part grasped and seated into
        the fixed base.
    fabrica_cooling_manifold_1:
      role: fixed_assembly_base
      summary: Static Fabrica cooling-manifold base plate used as the insertion reference.
    fabrica_cooling_manifold_2:
      role: staged_fabrica_part
      summary: Loose physical Fabrica cooling-manifold part staged for later assembly.
    fabrica_cooling_manifold_3:
      role: staged_fabrica_part
      summary: Loose physical Fabrica cooling-manifold part staged for later assembly.
    fabrica_cooling_manifold_4:
      role: staged_fabrica_part
      summary: Loose physical Fabrica cooling-manifold part staged for later assembly.
    fabrica_cooling_manifold_5:
      role: staged_fabrica_part
      summary: Loose physical Fabrica cooling-manifold part staged for later assembly.
    fabrica_cooling_manifold_6:
      role: staged_fabrica_part
      summary: Loose physical Fabrica cooling-manifold part staged for later assembly.
    optical_board:
      role: locating_board
      summary: Black Fabrica optical-board mesh loaded from the official bundle wrapper
        with its authored collision enabled.
    assembled_manifold_preview:
      role: assembled_reference_visual
      summary: Complete Fabrica cooling-manifold assembled USD preview placed beside
        the task base as a visual completion reference.
    workbench:
      role: support_surface
      summary: Factory workbench surface used by the RoboAssemblyBench scene profile.
  target_roles:
    left_wait:
      summary: Left-arm idle pose while the right arm performs sequential insertions.
    right_wait:
      summary: Right-arm staging pose.
    left_retreat:
      summary: Left-arm terminal retreat pose.
    right_retreat:
      summary: Right-arm terminal retreat pose after all six insertions.
  phase_notes:
  - name: sequential_part_insertions
    summary: The right arm sequentially inserts parts 0, 2, 3, 4, 5, and 6 into the
      fixed base plate fabrica_cooling_manifold_1.
    focus_objects:
