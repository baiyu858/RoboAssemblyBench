extends: _dual_franka_assembly_base.yaml
task_name: fabrica_cooling_manifold_hardcoded
prompt: 'Two Franka arms run a deterministic hardcoded Fabrica cooling-manifold assembly:
  the right arm carries each part and inserts six components into the fixed base.'
scene_profile: taoyuan_grscenes_tabletop
scene_asset_path: ${ISAAC_ASSETS_ROOT}/Isaac/Environments/Simple_Warehouse/warehouse_with_forklifts.usd
scene_asset_fallback_path: ${BENCHMARK_ROOT}/scenes/usd/factory_cell.usda
max_steps: 9800
phase_timeout_steps: 900
phase_timeout_action: fail
source_benchmark: fabrica
source_config_path: roboassemblybench/assets/Fabrica/fabrica_franka_cooling_optical_board_black_fullbundle_sdf001.zip
metadata:
  asset_source: ${BENCHMARK_ROOT}/assets/Fabrica
  asset_note: This task reuses the existing RoboAssemblyBench factory scene profile
    and references the Fabrica Franka cooling-manifold full bundle for the assembly
    parts. Unzip the full bundle next to the zip file to make the per-part USD paths
    below directly loadable.
  asset_references:
  - name: fabrica_franka_cooling_fullbundle
    kind: zip
    path: ${BENCHMARK_ROOT}/assets/Fabrica/fabrica_franka_cooling_optical_board_black_fullbundle_sdf001.zip
    role: source_bundle
  - name: fabrica_franka_scene_usda
    kind: scene
    path: ${BENCHMARK_ROOT}/assets/Fabrica/fabrica_franka_cooling_optical_board_black_fullbundle_sdf001/scene/scene.usda
    role: source_scene_reference
  - name: fabrica_cooling_manifest
    kind: manifest
    path: ${BENCHMARK_ROOT}/assets/Fabrica/fabrica_franka_cooling_optical_board_black_fullbundle_sdf001/assets/fabrica_original_usd_sdf_margin_001/aligned/cooling_manifold/manifest.json
    role: assembly_metadata
  - name: fabrica_cooling_assembled_preview
    kind: usd
    path: ${BENCHMARK_ROOT}/assets/Fabrica/fabrica_franka_cooling_optical_board_black_fullbundle_sdf001/assets/fabrica_original_usd_sdf_margin_001/aligned/cooling_manifold/assembled/fabrica_cooling_manifold_assembled.usda
    role: assembled_reference_visual
  - name: optical_board_visual_usd
    kind: usd
    path: ${BENCHMARK_ROOT}/assets/Fabrica/optical_board.usda
    role: locating_board_visual
  - name: optical_board_source_obj
    kind: obj
    path: ${BENCHMARK_ROOT}/assets/Fabrica/fabrica_franka_cooling_optical_board_black_fullbundle_sdf001/assets/fabrica_support/optical_board.obj
    role: original_source_mesh
  tags:
  - fabrica
  - cooling-manifold
  - insertion
  - usd-asset
  - dual-arm
  disable_joint_planner: true
  planner_note: The full cooling-manifold sequence uses many close-contact insertions.
    Disable the optional mplib/TOPPRA joint preplanner so the scripted policy uses
    its online IK fallback instead of aborting on a badly conditioned path.
  local_skills:
    factory_insert_rl:
      backend: isaaclab_factory
      source_repository: https://github.com/LezhiLiao/factory_dual_franka_peg_transfer
      checkpoint_repository: https://huggingface.co/Heiheiheidashuai/factory_dual_franka_peg_transfer_ckpt
      checkpoint: checkpoints/Factory/test/nn/Factory.pth
      agent_config: checkpoints/Factory/test/params/agent.yaml
      env_config: checkpoints/Factory/test/params/env.yaml
      adapter: toolkits.factory_dual_franka_assembly.factory_insert_adapter:FactoryPegInsertPolicyAdapter
      observation_space: 19
      action_space: 6
      device: cpu
      rl_position_step: 0.006
      target_bias_step: 0.002
      max_position_step: 0.006
      action_frame_radius: 0.05
      activation_distance: 0.04
      activation_payload_distance: 0.04
      trained_task: IsaacLab Factory peg_insert 8mm
      trained_robot: franka1
      adapter_status: checkpoint_driven_ik_delta_adapter_not_official_cooling_manifold_policy
      require_success: true
    hardcoded_insert:
      backend: deterministic_payload_delta
      adapter: toolkits.factory_dual_franka_assembly.factory_insert_adapter:HardcodedFabricaInsertAdapter
      coarse_step: 0.006
      fine_step: 0.002
      final_step: 0.0006
      coarse_distance: 0.035
      fine_distance: 0.01
      snap_when_close: false
      keep_current_orientation: true
      fallback: fail
      require_success: true
  fabrica_official_layout:
    source_scene: ${BENCHMARK_ROOT}/assets/Fabrica/fabrica_franka_cooling_optical_board_black_fullbundle_sdf001/scene/scene.usda
    source_scene_spec: ${BENCHMARK_ROOT}/assets/Fabrica/fabrica_franka_cooling_optical_board_black_fullbundle_sdf001/scene/scene_spec.json
    fixed_base_pose: assembled_display_part_1
    loose_part_pose_source: scene.usda loose part Xforms
    assembly_order:
    - 6
    - 2
    - 5
    - 3
    - 0
    - 4
    note: All mesh scales remain [1, 1, 1]; coordinates are converted to recipe-local
      z by subtracting the active workspace_offset z.
  fabrica_official_grasps:
    '6':
      selected_move_grasp_id: 1089
      orientation_wxyz:
      - -0.0531
      - 0.380473
      - 0.923007
      - 0.021888
      gripper_base_offset_m:
