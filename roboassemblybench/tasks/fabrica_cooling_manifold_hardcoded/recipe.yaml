      - 0.038827
      gripper_base_offset_m:
      - -0.01458353
      - -0.01590475
      - 0.1103092
    '0':
      selected_move_grasp_id: 152
      orientation_wxyz:
      - -0.089058
      - 0.904795
      - -0.233857
      - -0.344565
      gripper_base_offset_m:
      - 0.06540198
      - -0.03622833
      - 0.08392764
    '4':
      selected_move_grasp_id: 733
      orientation_wxyz:
      - -0.251526
      - -0.05864
      - 0.96484
      - 0.048787
      gripper_base_offset_m:
      - 0.05519818
      - -0.00726612
      - 0.09764284
  hardcoded_demo:
    mode: deterministic_fixplug_style_insert
    note: No RL checkpoint is used. Transport uses fixed-joint payload carry; insertion
      uses small deterministic payload-position steps toward seated targets, then
      locks each part after release.
